<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carrito de Compras - Productos de Informatica</title>

  <!-- Tipografias para dar una identidad visual mas marcada -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Encabezado principal de la tienda -->
  <header class="hero">
    <h1>Tienda de Informatica</h1>
    <p>Carrito de compras con validacion de pago y recibo en PDF</p>
  </header>

  <!-- Controles globales: moneda y modo visual -->
  <section class="toolbar">
    <label for="currencySelect">Moneda:</label>
    <select id="currencySelect" aria-label="Seleccion de moneda">
      <option value="GTQ">Quetzales (GTQ)</option>
      <option value="USD">Dolares (USD)</option>
    </select>

    <button id="themeToggle" class="btn-secondary" type="button">Modo oscuro</button>
  </section>

  <main class="layout">
    <section>
      <h2>Productos</h2>
      <!-- Contenedor dinamico de tarjetas de productos -->
      <div id="productsContainer" class="product-grid"></div>
    </section>

    <aside>
      <section class="preview-card">
        <h2>Vista previa</h2>
        <!-- La imagen y datos se actualizan al elegir un producto -->
        <img id="previewImage" src="" alt="Vista previa del producto" />
        <h3 id="previewName">Selecciona un producto</h3>
        <p id="previewPrice">--</p>
      </section>

      <section class="cart-card">
        <h2>Carrito</h2>
        <!-- Lista dinamica de productos en carrito -->
        <ul id="cartItems"></ul>
        <p class="total" id="cartTotal">Total: Q0.00</p>

        <div class="actions-row">
          <button id="clearCart" class="btn-danger" type="button">Vaciar carrito</button>
        </div>
      </section>

      <section class="payment-card">
        <h2>Validar pago</h2>

        <!-- Formulario minimo para validar datos de pago -->
        <div class="form-row">
          <label for="customerName">Nombre completo</label>
          <input id="customerName" type="text" placeholder="Ejemplo: Ana Lopez" />
        </div>

        <div class="form-row">
          <label for="customerEmail">Correo</label>
          <input id="customerEmail" type="email" placeholder="ejemplo@correo.com" />
        </div>

        <div class="form-row">
          <label for="paymentMethod">Metodo de pago</label>
          <select id="paymentMethod">
            <option value="">Seleccione...</option>
            <option value="tarjeta">Tarjeta</option>
            <option value="efectivo">Efectivo</option>
            <option value="transferencia">Transferencia</option>
          </select>
        </div>

        <!-- Campos visibles solo cuando se paga con tarjeta -->
        <div id="cardFields" hidden>
          <div class="form-row">
            <label for="cardNumber">Numero de tarjeta</label>
            <input id="cardNumber" type="text" inputmode="numeric" placeholder="16 digitos" maxlength="19" />
          </div>
          <div class="form-row">
            <label for="cardCvv">CVV</label>
            <input id="cardCvv" type="password" inputmode="numeric" placeholder="3 o 4 digitos" maxlength="4" />
          </div>
        </div>

        <div class="actions-row">
          <button id="validatePayment" type="button">Validar pago</button>
          <button id="downloadReceipt" class="btn-secondary" type="button" disabled>Generar recibo PDF</button>
        </div>
      </section>
    </aside>
  </main>

  <footer>
    <small>Proyecto de carrito de compras de productos de informatica.</small>
  </footer>

  <!-- Libreria para alertas visuales solicitadas por el usuario -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <!-- Libreria para crear el recibo PDF desde JavaScript -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
